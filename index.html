<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 모바일 줌 제한 및 꽉 찬 화면 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>부릉부릉! 토이카 런 🚗</title>
  
  <!-- 귀여운 한글 및 영문 폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- 게임 렌더링 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 상단 UI 레이어 (점수, 라이프) -->
    <div id="hud">
      <div class="hud-item score-container">
        <span class="hud-label">SCORE</span>
        <span id="scoreVal" class="hud-value">0</span>
      </div>
      <div class="hud-item life-container">
        <div id="heartContainer">
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
        </div>
      </div>
    </div>

    <!-- 1. 시작 화면 -->
    <div id="startScreen" class="overlay-screen active">
      <div class="screen-content">
        <div class="logo-area">
          <span class="emoji-logo">🚗</span>
          <h1 class="game-title">부릉부릉 토이카!</h1>
        </div>
        <p class="game-subtitle">장애물을 피해 더 멀리 달려봐요!</p>
        
        <div class="instructions-box">
          <p>⌨️ <strong>PC 조작:</strong> 방향키 ◀ ▶ 또는 A / D</p>
          <p>📱 <strong>모바일:</strong> 하단 좌/우 영역 터치</p>
        </div>

        <button id="startBtn" class="btn-primary">게임 시작하기!</button>
      </div>
    </div>

    <!-- 2. 게임오버 화면 -->
    <div id="gameOverScreen" class="overlay-screen">
      <div class="screen-content">
        <span class="emoji-logo">💥</span>
        <h1 class="game-title text-danger">앗! 부딪혔어요!</h1>
        
        <div class="score-board">
          <div class="score-result">
            <span class="result-label">이번 점수</span>
            <span id="finalScore" class="result-val">0</span>
          </div>
          <div class="score-result">
            <span class="result-label">🏆 최고 점수</span>
            <span id="bestScore" class="result-val">0</span>
          </div>
        </div>

        <button id="restartBtn" class="btn-primary btn-bounce">다시 달리기 🔄</button>
      </div>
    </div>

    <!-- 3. 모바일 터치 컨트롤 (가상 패널) -->
    <div id="touchControls">
      <div id="touchLeft" class="touch-zone">
        <div class="touch-btn-visual">◀</div>
      </div>
      <div id="touchRight" class="touch-zone">
        <div class="touch-btn-visual">▶</div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
